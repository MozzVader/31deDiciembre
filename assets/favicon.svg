<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g transform="translate(32,32)">
    <!-- Base del joystick -->
    <ellipse cx="0" cy="4" rx="16" ry="12" fill="#1e1b4b" opacity="0.3"/>
    <ellipse cx="0" cy="2" rx="16" ry="12" fill="white" opacity="0.15"/>
    <rect x="-14" y="2" width="28" height="18" rx="4" fill="white" opacity="0.95"/>
    <rect x="-14" y="2" width="28" height="8" rx="4" fill="white" opacity="0.95"/>
    <!-- Stick -->
    <line x1="0" y1="2" x2="0" y2="-8" stroke="#4338ca" stroke-width="4" stroke-linecap="round"/>
    <!-- Boton rojo -->
    <circle cx="-8" cy="-14" r="4" fill="#ef4444"/>
    <!-- Boton azul -->
    <circle cx="0" cy="-18" r="4" fill="#3b82f6"/>
    <!-- Boton verde -->
    <circle cx="8" cy="-14" r="4" fill="#22c55e"/>
  </g>
</svg>
